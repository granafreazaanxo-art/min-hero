<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Min Hero - Centrado</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
        }
        /* Esto obliga al motor a centrarse independientemente del SWF */
        ruffle-player {
            width: 100% !important;
            height: 100% !important;
            margin: auto !important; 
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script src="ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("game-container").appendChild(player);
            player.load({
                url: "min-hero-tower-of-sages.swf",
                scale: "showAll",
                forceScale: true,
                letterbox: "on"
            });
        });
    </script>
</body>
</html>
