<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min Hero: Tower of Sages - Pantalla Completa</title>
    <style>
        /* Eliminamos margenes y obligamos al fondo a ser negro */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* El contenedor ocupa todo el espacio visual disponible */
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ajuste para que el reproductor de Ruffle sea flexible */
        ruffle-player {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script src="ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            container.appendChild(player);
            
            player.load({
                url: "min-hero-tower-of-sages.swf",
                /* Parámetros críticos para corregir el tamaño tras la carga */
                scale: "showAll",      // Muestra todo el juego
                forceScale: true,      // Ignora el tamaño interno del SWF
                letterbox: "on",       // Mantiene la proporción original
                wmode: "opaque",       // Mejora la integración visual
                autoplay: "on",
                unmuteOverlay: "hidden"
            });
        });
    </script>
</body>
</html>
