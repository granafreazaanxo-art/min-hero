<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Min Hero: Tower of Sages</title>
    <style>
        /* Estilo para que el juego ocupe toda la pantalla disponible */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Elimina las barras de scroll */
        }
        #game {
            width: 100vw; /* 100% del ancho de la ventana */
            height: 100vh; /* 100% del alto de la ventana */
        }
    </style>
</head>
<body>
    <div id="game"></div>

    <script src="ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game");
            container.appendChild(player);
            
            player.load({
                url: "min-hero-tower-of-sages.swf",
                letterbox: "on", /* Mantiene la proporción original sin deformar */
                autoplay: "on",
                unmuteOverlay: "hidden"
            });
            
            // Ajuste automático si cambias el tamaño de la ventana
            player.style.width = "100%";
            player.style.height = "100%";
        });
    </script>
</body>
</html>
