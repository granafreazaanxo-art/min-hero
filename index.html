<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Min Hero - Fullscreen Fix</title>
   <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        background-color: #000;
        overflow: hidden;
        /* Esto centrará el juego horizontalmente en la pantalla */
        display: flex;
        justify-content: center; 
        align-items: center;
    }

    #game-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    ruffle-player {
        /* Mantenemos el máximo tamaño posible */
        width: 100% !important;
        height: 100% !important;
    }
</style>
</head>
<body>
    <div id="game-container"></div>

    <script src="ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            container.appendChild(player);
            
            player.load({
                url: "min-hero-tower-of-sages.swf",
                // Estas opciones obligan al motor a escalar el contenido
                scale: "showAll",
                forceScale: true,
                letterbox: "on",
                wmode: "opaque",
                autoplay: "on",
                unmuteOverlay: "hidden"
            });
        });
    </script>
</body>
</html>
