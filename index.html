<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Min Hero Local</title>
    <style>
    body { 
        margin: 0; 
        background: #000; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        overflow: hidden; /* Evita barras de desplazamiento */
    }
    #game { 
        /* Cambia estos valores para que sea más grande o usa porcentajes */
        width: 100vw; 
        height: 100vh; 
    }
</style>
</head>
<body>
    <div id="game"></div>

    <script src="ruffle.js"></script> 
    
    <script>
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();
        document.getElementById("game").appendChild(player);
        player.load("min-hero-tower-of-sages.swf");
    </script>
</body>
</html>
